name: Prepare FlareMo update

on:
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to install, for example v0.3.1. Leave empty for latest."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: flaremo-update
  cancel-in-progress: false

jobs:
  prepare-update:
    if: github.repository != 'realchendahuang/FlareMo'
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}
      REQUESTED_VERSION: ${{ inputs.version }}
      UPSTREAM_REPOSITORY: realchendahuang/FlareMo
    steps:
      - name: Check out deployment repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare update pull request
        shell: bash
        run: |
          set -euo pipefail

          target_version="${REQUESTED_VERSION}"
          if [[ -z "${target_version}" ]]; then
            target_version="$(gh api "repos/${UPSTREAM_REPOSITORY}/releases/latest" --jq .tag_name)"
          fi
          if [[ ! "${target_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid FlareMo release tag: ${target_version}" >&2
            exit 1
          fi

          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if [[ ! "${current_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid installed FlareMo version: ${current_version}" >&2
            exit 1
          fi

          target_number="${target_version#v}"
          IFS=. read -r current_major current_minor current_patch <<< "${current_version}"
          IFS=. read -r target_major target_minor target_patch <<< "${target_number}"
          if (( target_major < current_major ||
                (target_major == current_major && target_minor < current_minor) ||
                (target_major == current_major && target_minor == current_minor && target_patch < current_patch) )); then
            echo "Refusing to downgrade FlareMo from v${current_version} to ${target_version}." >&2
            exit 1
          fi
          if [[ "${target_number}" == "${current_version}" ]]; then
            echo "${target_version} is already installed."
            exit 0
          fi

          git remote add flaremo-upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags flaremo-upstream \
            "refs/tags/v${current_version}:refs/tags/v${current_version}" \
            "refs/tags/${target_version}:refs/tags/${target_version}"

          update_branch="flaremo-update/${target_version}"
          git config user.name "flaremo-update[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "${update_branch}" "origin/${BASE_BRANCH}"

          update_patch="$(mktemp)"
          git diff --binary --full-index \
            "refs/tags/v${current_version}" \
            "refs/tags/${target_version}" > "${update_patch}"
          if ! git apply --3way --index "${update_patch}"; then
            echo "The deployment repository conflicts with ${target_version}. Resolve the update manually." >&2
            exit 1
          fi
          git commit -m "Update FlareMo from v${current_version} to ${target_version}"

          if git ls-remote --exit-code --heads origin "${update_branch}" >/dev/null 2>&1; then
            git fetch origin "refs/heads/${update_branch}:refs/remotes/origin/${update_branch}"
          fi
          git push --force-with-lease --set-upstream origin "${update_branch}"

          existing_pr="$(gh pr list --head "${update_branch}" --state open --json url --jq '.[0].url // empty')"
          if [[ -n "${existing_pr}" ]]; then
            echo "Update pull request already exists: ${existing_pr}"
            exit 0
          fi

          pr_body="A new stable FlareMo release is available. Review the release notes and merge this pull request to let Cloudflare Workers Builds deploy it.

          Release notes: https://github.com/${UPSTREAM_REPOSITORY}/releases/tag/${target_version}"
          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${update_branch}" \
            --title "Update FlareMo to ${target_version}" \
            --body "${pr_body}"
